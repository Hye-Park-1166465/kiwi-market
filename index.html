<style>
:root{--g1:#1B4332;--g2:#2D6A4F;--g3:#40916C;--g4:#52B788;--g5:#95D5B2;--gold:#C4A265;--cream:#FDF8F0;--sand:#F5EFE6;--dk:#16251C;--tx:#1a2e1a;--mu:#7A8A7A;--wh:#fff}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--cream);color:var(--tx);max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:72px;-webkit-font-smoothing:antialiased}
h1,h2,h3,.sf{font-family:'DM Serif Display',Georgia,serif}
.b{border:none;cursor:pointer;border-radius:12px;font-family:inherit;transition:all .2s ease;-webkit-tap-highlight-color:transparent}
.b:active{transform:scale(.96);opacity:.9}
.c{background:var(--wh);border-radius:16px;border:1px solid rgba(45,106,79,.08);transition:all .25s;cursor:pointer}
.c:hover{box-shadow:0 8px 30px rgba(27,67,50,.1);transform:translateY(-1px)}
.c:active{transform:scale(.98)}
.ov{position:fixed;inset:0;background:rgba(27,67,50,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sh{background:var(--wh);border-radius:24px 24px 0 0;padding:28px 24px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:su .35s cubic-bezier(.22,1,.36,1)}
@keyframes su{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes st{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
.fu{animation:fu .4s cubic-bezier(.22,1,.36,1) both}
input,textarea,select{font-family:inherit;font-size:15px;padding:14px 16px;border:1.5px solid #dde5dd;border-radius:12px;background:var(--wh);color:var(--tx);outline:none;width:100%;transition:all .2s}
input:focus,textarea:focus,select:focus{border-color:var(--g2);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
textarea{resize:vertical;min-height:80px}
.bn{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(45,106,79,.08);display:flex;z-index:50;padding:6px 0 env(safe-area-inset-bottom,8px)}
.nb{flex:1;padding:6px 0;border:none;background:0;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;color:var(--mu);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;letter-spacing:.3px;text-transform:uppercase}
.nb.on{color:var(--g2)}
.nb .ni{font-size:20px;transition:transform .2s}
.nb.on .ni{transform:scale(1.15)}
.nd{width:4px;height:4px;border-radius:2px;background:var(--g2);margin-top:2px;opacity:0;transition:opacity .2s}
.nb.on .nd{opacity:1}
.to{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--g1);color:#fff;padding:14px 28px;border-radius:14px;font-size:14px;font-weight:600;box-shadow:0 12px 40px rgba(27,67,50,.25);animation:st .35s cubic-bezier(.22,1,.36,1);z-index:200;white-space:nowrap}
.ew{width:100%;aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ew::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.35) 0%,transparent 70%)}
.fl{font-size:12px;font-weight:700;color:var(--mu);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.8px}
.ep{font-size:24px;padding:8px;border:2px solid transparent;border-radius:10px;background:var(--sand);cursor:pointer;transition:all .15s}
.ep.on{border-color:var(--g2);background:var(--g5);transform:scale(1.1)}
.bd{font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px;color:#fff;letter-spacing:.5px;text-transform:uppercase}
input::placeholder{color:rgba(255,255,255,.45)}
</style>
</head>
<body>
<div id="app"></div>

{id:"i21",title:"Merino Wool Scarf",price:40,category:"NZ Health",description:"Handmade NZ merino wool. Soft & warm.",location:"Addington",time:"3d",status:"available",seller:"Lisa",image:"🧣"},

const gid=()=>"i"+Date.now()+Math.random().toString(36).slice(2,5);
const ld=(k,f)=>{try{const d=localStorage.getItem(k);return d?JSON.parse(d):f}catch{return f}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const EM=["💻","📱","🎮","📖","🧥","👟","🪑","🍳","⚽","🧸","🍯","🥛","🐝","🦌","🧴","🥚","🥑","🥩","🧼","🧣"];

function App(){
const[items,setItems]=useState(()=>ld("kiwi-v3",IS));
const[vw,setVw]=useState("home");
const[cat,setCat]=useState("All");
const[q,setQ]=useState("");
const[sel,setSel]=useState(null);
const[toast,setToast]=useState(null);
const[sp,setSp]=useState(false);
const[ci,setCi]=useState(null);
const[ms,setMs]=useState([]);
const[mi,setMi]=useState("");
const[ni,setNi]=useState({title:"",price:"",category:"Electronics",description:"",location:"Christchurch",image:""});

useEffect(()=>{sv("kiwi-v3",items)},[items]);
const sT=useCallback(m=>{setToast(m);setTimeout(()=>setToast(null),2500)},[]);
const fl=items.filter(i=>(cat==="All"||i.category===cat)&&(!q||i.title.toLowerCase().includes(q.toLowerCase())||i.description.toLowerCase().includes(q.toLowerCase())));

const post=()=>{if(!ni.title.trim()||!ni.price)return sT("Title and price required");setItems(p=>[{...ni,id:gid(),title:ni.title.trim(),price:Number(ni.price),description:ni.description.trim(),location:ni.location.trim()||"Christchurch",image:ni.image||"📦",seller:"Sage",time:"Now",status:"available"},...p]);setSp(false);setNi({title:"",price:"",category:"Electronics",description:"",location:"Christchurch",image:""});sT("Listed! 🥝")};

const dl=id=>{setItems(p=>p.filter(i=>i.id!==id));setSel(null);setVw("my");sT("Removed")};
const sc=()=>{if(!mi.trim())return;setMs(p=>[...p,{f:"me",t:mi.trim()}]);const c=mi.toLowerCase();const r=c.includes("price")||c.includes("가격")?"It's $"+ci.price+". Interested?":c.includes("available")||c.includes("있")?"Yes! When works for pickup?":"Thanks! I'll reply soon 👍";setTimeout(()=>setMs(p=>[...p,{f:"s",t:r}]),800);setMi("")};
const gr=c=>CG[c]||"linear-gradient(135deg,#f5f5f5,#eee)";

return(
<div>
{vw==="home"&&!sel&&!ci&&(<div>
<div style={{background:"linear-gradient(160deg,#1B4332 0%,#2D6A4F 60%,#40916C 100%)",padding:"32px 20px 24px",position:"relative",overflow:"hidden"}}>
<div style={{position:"absolute",top:"-30%",right:"-10%",width:200,height:200,borderRadius:"50%",background:"rgba(149,213,178,.08)"}}/>
<div style={{position:"absolute",bottom:"-20%",left:"-5%",width:120,height:120,borderRadius:"50%",background:"rgba(149,213,178,.06)"}}/>
<div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,position:"relative"}}>
<div><h1 className="sf" style={{fontSize:26,fontWeight:400,color:"#fff",letterSpacing:-.5}}>🥝 Kiwi Market</h1>
<p style={{fontSize:11,color:"rgba(149,213,178,.8)",marginTop:4,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase"}}>Secondhand · Health · Farm Fresh</p></div>
<div style={{background:"rgba(255,255,255,.12)",borderRadius:12,padding:"8px 14px",backdropFilter:"blur(8px)"}}><span style={{fontSize:20,fontWeight:800,color:"#fff"}}>{items.filter(i=>i.status==="available").length}</span><span style={{fontSize:11,color:"rgba(255,255,255,.7)",marginLeft:4}}>listed</span></div>

<div style={{padding:"16px 20px 8px",overflowX:"auto",display:"flex",gap:8,whiteSpace:"nowrap",WebkitOverflowScrolling:"touch"}}>

{fl.length===0?(<div style={{textAlign:"center",padding:"48px 24px",color:"var(--mu)"}}><div style={{fontSize:48,marginBottom:12}}>🔍</div><p className="sf" style={{fontSize:18}}>Nothing found</p></div>
):(
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
{fl.map((it,idx)=>(<div key={it.id} className="c fu" onClick={()=>setSel(it)} style={{overflow:"hidden",opacity:it.status==="sold"?.55:1,animationDelay:`${idx*.04}s`}}>

<div style={{padding:"12px 14px 14px"}}><h3 style={{fontSize:13,fontWeight:700,marginBottom:4,lineHeight:1.3,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{it.title}</h3>
<p style={{fontSize:11,color:"var(--mu)",marginBottom:6}}>{it.location} · {it.time}</p>
<p className="sf" style={{fontSize:17,color:"var(--g2)"}}>${it.price}</p></div></div>))}
</div>)}
</div></div>)}

{sel&&!ci&&(<div className="fu" style={{background:"var(--cream)",minHeight:"100vh"}}>
<div style={{background:gr(sel.category),height:240,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>

{sel.status!=="reserved"&&<button className="b" onClick={()=>uS(sel.id,"reserved")} style={{padding:"13px 22px",background:"var(--sand)",color:"#B8860B",fontSize:13,fontWeight:700}}>Reserve</button>}

<div style={{flex:1,padding:"16px 20px",overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>

<div style={{background:m.f==="me"?"linear-gradient(135deg,var(--g1),var(--g2))":m.f==="sys"?"var(--sand)":"var(--wh)",color:m.f==="me"?"#fff":"var(--tx)",padding:m.f==="sys"?"8px 16px":"12px 18px",borderRadius:18,fontSize:m.f==="sys"?12:14,boxShadow:m.f==="sys"?"none":"0 2px 8px rgba(0,0,0,.06)",lineHeight:1.5}}>{m.t}</div></div>))}

<input value={mi} onChange={e=>setMi(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sc()} placeholder="Type a message..." style={{flex:1,borderRadius:20,padding:"12px 18px"}}/>
<button className="b" onClick={sc} style={{background:"linear-gradient(135deg,var(--g1),var(--g2))",color:"#fff",padding:"12px 20px",fontWeight:700,borderRadius:20}}>↑</button></div></div>)}

{vw==="my"&&!sel&&!ci&&(<div className="fu">
<div style={{background:"linear-gradient(160deg,#1B4332 0%,#2D6A4F 60%,#40916C 100%)",padding:"32px 20px",color:"#fff",position:"relative",overflow:"hidden"}}>
<div style={{position:"absolute",top:"-20%",right:"-8%",width:160,height:160,borderRadius:"50%",background:"rgba(149,213,178,.08)"}}/>
<div style={{display:"flex",alignItems:"center",gap:16}}>
<div style={{width:60,height:60,borderRadius:30,background:"rgba(255,255,255,.15)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:800}}>S</div>
<div><h2 className="sf" style={{fontSize:24,fontWeight:400}}>Sage</h2><p style={{fontSize:12,color:"rgba(149,213,178,.8)",marginTop:2}}>{my.length} items · Christchurch</p></div></div></div>
<div style={{padding:20}}>
<div style={{fontSize:13,fontWeight:700,color:"var(--g2)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:12}}>My Listings</div>
{my.length===0?<div style={{textAlign:"center",padding:40,color:"var(--mu)"}}>No listings yet</div>:
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
{my.map(it=>(<div key={it.id} className="c" onClick={()=>setSel(it)} style={{overflow:"hidden",opacity:it.status==="sold"?.55:1}}>
<div className="ew" style={{background:gr(it.category),height:80,aspectRatio:"auto"}}><span style={{fontSize:32}}>{it.image}</span>
<div className="bd" style={{position:"absolute",bottom:6,right:6,background:SC[it.status],fontSize:8}}>{SL[it.status]}</div></div>
<div style={{padding:"10px 12px"}}><h4 style={{fontSize:12,fontWeight:700,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.title}</h4>
<p className="sf" style={{fontSize:15,color:"var(--g2)"}}>${it.price}</p></div></div>))}</div>}
<div style={{marginTop:28,padding:20,background:"var(--sand)",borderRadius:16}}>
<p style={{fontSize:12,fontWeight:600,color:"var(--mu)",marginBottom:10}}>Reset to defaults</p>
<button className="b" onClick={()=>{setItems(IS);sT("Reset")}} style={{padding:"10px 20px",background:"#e8c4c4",color:"#8B3A3A",fontSize:12,fontWeight:700}}>Reset All</button></div></div></div>)}

{sp&&(<div className="ov" onClick={()=>setSp(false)}><div className="sh" onClick={e=>e.stopPropagation()}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
<h3 className="sf" style={{fontSize:24,fontWeight:400}}>List an Item</h3>
<button className="b" onClick={()=>setSp(false)} style={{background:"var(--sand)",padding:"8px 14px",fontSize:14,borderRadius:10}}>✕</button></div>
<div style={{marginBottom:18}}><label className="fl">Icon</label>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{EM.map(e=>(<button key={e} className={"ep"+(ni.image===e?" on":"")} onClick={()=>setNi({...ni,image:e})}>{e}</button>))}</div></div>
<div style={{marginBottom:16}}><label className="fl">Title *</label><input value={ni.title} onChange={e=>setNi({...ni,title:e.target.value})} placeholder="What are you selling?"/></div>
<div style={{marginBottom:16}}><label className="fl">Price (NZD) *</label><input type="number" value={ni.price} onChange={e=>setNi({...ni,price:e.target.value})} placeholder="0"/></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
<div><label className="fl">Category</label><select value={ni.category} onChange={e=>setNi({...ni,category:e.target.value})}>{CS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select></div>
<div><label className="fl">Location</label><input value={ni.location} onChange={e=>setNi({...ni,location:e.target.value})} placeholder="Christchurch"/></div></div>
<div style={{marginBottom:16}}><label className="fl">Description</label><textarea value={ni.description} onChange={e=>setNi({...ni,description:e.target.value})} placeholder="Describe your item..."/></div>
<button className="b" onClick={post} style={{width:"100%",padding:"16px 0",background:"linear-gradient(135deg,var(--g1),var(--g2))",color:"#fff",fontSize:15,fontWeight:700,borderRadius:14,boxShadow:"0 6px 24px rgba(27,67,50,.3)",marginTop:4}}>List Item 🥝</button>
</div></div>)}

{toast&&<div className="to">{toast}</div>}

{!ci&&(<div className="bn">
<button className={"nb"+(vw==="home"&&!sel?" on":"")} onClick={()=>{setVw("home");setSel(null)}}><span className="ni">🏠</span>Home<div className="nd"/></button>
<button className={"nb"+(sp?" on":"")} onClick={()=>{setSp(true);setSel(null)}}><span className="ni" style={{fontSize:24}}>＋</span>Sell<div className="nd"/></button>
<button className={"nb"+(vw==="my"&&!sel?" on":"")} onClick={()=>{setVw("my");setSel(null)}}><span className="ni">👤</span>My<div className="nd"/></button>
</div>)}
</div>);
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{})})}</script>
</body>
</html>
